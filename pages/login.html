<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Blue Fin Swim School — ActivityBookr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,600&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

  <div class="auth-layout">
    <a class="auth-brand" href="home.html">Activity<span>Bookr</span></a>

    <div class="auth-card">

      <!-- Main form -->
      <div id="login-main">
        <div class="auth-card-header">
          <h2 class="auth-title">Welcome back</h2>
          <p class="auth-sub">Log in to your Blue Fin Swim School account.</p>
        </div>
        <div class="form-fields">
          <div class="form-field"><label class="form-label">Email address</label><input class="form-input" type="email"
              id="login-email" placeholder="thandi@email.com" autocomplete="email">
            <div class="form-error" id="err-email"></div>
          </div>
          <div class="form-field">
            <label class="form-label">Password <button class="form-label-action" onclick="showForgot()">Forgot
                password?</button></label>
            <div class="form-input-icon-wrap">
              <input class="form-input form-input-iconed" type="password" id="login-password"
                placeholder="Your password" autocomplete="current-password">
              <button class="form-icon-btn" onclick="togglePwd('login-password',this)" tabindex="-1"><svg width="16"
                  height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg></button>
            </div>
            <div class="form-error" id="err-password"></div>
          </div>
          <label class="form-check"><input type="checkbox" id="remember" checked><span
              class="form-check-box"></span><span class="form-check-label">Keep me logged in</span></label>
        </div>
        <div class="form-error" id="err-general" style="text-align:center;margin:8px 0"></div>
        <button class="btn btn-primary" style="width:100%;margin-top:8px" id="login-btn" onclick="login_submit()">Log in
          →</button>
        <div class="auth-divider"><span>or</span></div>
        <button class="btn btn-outline" style="width:100%;gap:10px" onclick="login_demo()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="8" r="4" />
            <path d="M20 21a8 8 0 10-16 0" />
          </svg>
          Continue as demo parent
        </button>
        <div class="auth-switch">Don't have an account? <a class="auth-switch-link" href="register.html">Sign up
            free</a></div>
      </div>

      <!-- Forgot password -->
      <div id="login-forgot" style="display:none">
        <div class="auth-card-header">
          <button class="auth-back-btn" onclick="hideForgot()">← Back to login</button>
          <h2 class="auth-title" style="margin-top:12px">Reset password</h2>
          <p class="auth-sub">Enter your email and we'll send a reset link.</p>
        </div>
        <div class="form-fields">
          <div class="form-field"><label class="form-label">Email address</label><input class="form-input" type="email"
              id="forgot-email" placeholder="thandi@email.com">
            <div class="form-error" id="err-forgot"></div>
          </div>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="login_forgot()">Send reset
          link</button>
      </div>

      <!-- Reset sent -->
      <div id="login-reset-sent" style="display:none;text-align:center">
        <div style="font-size:48px;margin-bottom:16px"><img src="../assets/inbox-solid-full.svg" alt="" srcset="" style="height: 2.5rem;"></div>
        <h2 class="auth-title">Reset link sent</h2>
        <p class="auth-sub" style="margin-bottom:24px">Check your email. The link expires in 30 minutes.</p>
        <button class="btn btn-outline" style="width:100%" onclick="hideForgot()">Back to login</button>
      </div>

    </div>
    <div class="auth-footer">Secure login · Powered by ActivityBookr</div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="../js/app.js"></script>
  <script src="../js/nav.js"></script>
  <script src="../js/login.js"></script>
</body>

</html>
